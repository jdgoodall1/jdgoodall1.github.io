---
layout: default
---

<div class="page-header bg-light py-5 mb-5">
    <div class="container">
        <h1 class="display-4 fw-bold text-center">{{ page.title }}</h1>
        {% if page.subtitle %}
        <p class="lead text-center text-muted">{{ page.subtitle }}</p>
        {% endif %}
    </div>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-lg-10 mx-auto">
            {{ content }}
        </div>
    </div>
</div>
