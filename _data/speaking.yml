- title: "Keeping On-Call Human: Serverless Slack Out-of-Hours Alerts"
  event: "AWS Summit London"
  date: 2026-04-22
  location: "London, UK"
  description: "A serverless system monitoring customer Slack channels out-of-hours, sending low-severity alerts to on-call engineers to reduce wake-ups while maintaining visibility. Covers AWS architecture (API Gateway, Lambda, SQS, DynamoDB TTL, SNS) and reliability patterns including signature validation, idempotency, deduplication, DLQs, retries, and CloudWatch observability."
