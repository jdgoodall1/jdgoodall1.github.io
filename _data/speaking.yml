- title: "Keeping On-Call Human: AWS Serverless Slack After-Hours Alerts"
  event: "AWS Summit London"
  date: 2026-04-22
  location: "London, UK"
  description: "A serverless system monitoring customer Slack channels out-of-hours (5:30pm-8:00am), sending low-severity alerts to on-call engineers to reduce wake-ups while maintaining visibility. Covers AWS architecture (API Gateway, Lambda, SQS, DynamoDB TTL, SNS) and reliability patterns: signature validation, idempotency, deduplication, DLQs, retries, and CloudWatch observability. A reusable blueprint for smarter, human-friendly alerting."
