# Site settings
title: Jon Goodall
name: Jon Goodall
email: jongoodall14@gmail.com
description: Principal Cloud Engineer @<a href="https://www.logicata.com/" target="_blank">Logicata</a>, specializing in DevOps and AWS
keywords: "DevOps, Agile, Terraform, Ansible, Hashicorp, Vault, AWS, Jenkins, Cloudformation, AWS Certified, Cloud"
skills: "Principal Cloud Engineer in Sussex"
baseurl: ""
url: "https://jdgoodall1.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Pagination
paginate: 10
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Plugins (GitHub Pages whitelist)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .git/
  - .gitignore
  - README.md
  - VALIDATION_SUMMARY.md  # Documentation file, not for site rendering
  - _templates/  # Template files for reference, not for rendering

# Social networks
social:
  - title: linkedin
    url: https://www.linkedin.com/in/jdgoodall1/
  - title: github
    url: https://github.com/jdgoodall1
  - title: medium
    url: https://medium.com/@jdgoodall1
  - title: dev
    url: https://dev.to/jdgoodall1
  - title: wordpress
    url: https://sarcasticdevops.wordpress.com

